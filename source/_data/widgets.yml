# 侧边栏组件配置（与主题默认 _data/widgets.yml 合并，只需写要覆盖的字段）
# 可用组件见 node_modules/hexo-theme-stellar/_data/widgets.yml

# GitHub 名片：头像 + followers / following / repos 计数 + Follow 按钮
ghuser:
  username: softstarssl

# 标签云：显示每个标签的文章数
tagcloud:
  show_count: true

# 近期发布组件：标题旁显示 RSS 订阅入口
recent:
  rss: /atom.xml

# 首页个人介绍与快捷入口
profile:
  layout: markdown
  content: |
    <div class="home-profile">
      <span class="eyebrow">WELCOME</span>
      <h3>你好，我是 softstar</h3>
      <p>计算机科学在读，关注 AI4SE、算法与有趣的工程实践。</p>
    </div>
  linklist:
    columns: 2
    items:
      - title: 关于我
        url: /about/
      - title: 学习笔记
        url: /wiki/
      - title: 随便看看
        url: '#random-post'
      - title: GitHub
        url: https://github.com/softstarssl
